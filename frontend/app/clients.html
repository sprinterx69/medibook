<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clients — Callora</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .client-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; box-shadow: var(--shadow-xs); transition: box-shadow 0.2s, border-color 0.2s; cursor: pointer; }
    .client-card:hover { box-shadow: var(--shadow); border-color: var(--border-strong); }
    .client-card-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
    .client-av { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; flex-shrink: 0; }
    .client-name { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.2; }
    .client-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .client-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding-top: 12px; border-top: 1px solid var(--border); }
    .cs-val { font-size: 17px; font-weight: 700; color: var(--text); }
    .cs-lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    .filter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .filter-tab { padding: 5px 14px; border-radius: 6px; border: none; background: none; font-family: inherit; font-size: 12.5px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
    .filter-tab.active { background: var(--surface); color: var(--text); border: 1px solid var(--border); box-shadow: var(--shadow-xs); }
    .filter-tab:hover:not(.active) { color: var(--text-2); }
    @keyframes shimmer { 0%{background-position:-200px 0} 100%{background-position:calc(200px + 100%) 0} }
    .skeleton { background: linear-gradient(90deg,var(--surface-2) 25%,var(--surface-3) 50%,var(--surface-2) 75%); background-size:200px 100%; animation: shimmer 1.3s infinite; border-radius: 4px; height: 140px; }
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">C</div>
      <span class="logo-text">Callora</span>
    </div>
    <div class="sidebar-scroll">
      <div class="nav-section">Main</div>
      <a href="dashboard.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1" y="1" width="6" height="6" rx="1.2"/><rect x="9" y="1" width="6" height="6" rx="1.2"/><rect x="1" y="9" width="6" height="6" rx="1.2"/><rect x="9" y="9" width="6" height="6" rx="1.2"/></svg>
        Dashboard
      </a>
      <a href="calendar.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1.5" y="2.5" width="13" height="12" rx="1.5"/><path d="M5 1v3M11 1v3M1.5 6.5h13"/></svg>
        Calendar
      </a>
      <a href="clients.html" class="nav-item active">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="6" cy="5" r="2.5"/><path d="M1 13.5c0-2.485 2.239-4.5 5-4.5s5 2.015 5 4.5"/><circle cx="12" cy="5" r="2"/><path d="M14.5 13c0-1.8-1.12-3.34-2.75-4"/></svg>
        Clients
      </a>
      <a href="payments.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1" y="3.5" width="14" height="10" rx="1.5"/><path d="M1 7h14"/></svg>
        Payments
      </a>
      <a href="staff.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="5.5" r="3"/><path d="M2 13.5c0-2.761 2.686-5 6-5s6 2.239 6 5"/></svg>
        Staff
      </a>
      <div class="nav-section">Tools</div>
      <a href="agent.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M13 10.5c0 .276-.06.536-.168.77A2.5 2.5 0 0110.5 13c-4.142 0-7.5-3.358-7.5-7.5A2.5 2.5 0 015.23 3.168C5.464 3.06 5.724 3 6 3c.138 0 .25.112.25.25v.002l.75 3a.25.25 0 01-.062.244L5.75 7.684a7.04 7.04 0 002.566 2.566l1.188-1.188a.25.25 0 01.244-.062l3 .75c.138.034.252.15.252.25z"/></svg>
        AI Agent
        <span class="nav-badge green">Live</span>
      </a>
      <a href="settings.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="2.2"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M2.697 2.697l1.06 1.06M12.243 12.243l1.06 1.06M13.303 2.697l-1.06 1.06M3.757 12.243l-1.06 1.06"/></svg>
        Settings
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-av" id="sidebarAv">—</div>
        <div>
          <div class="user-name" id="sidebarName">Loading…</div>
          <div class="user-role">Clinic Owner</div>
        </div>
      </div>
      <a href="#" id="signOutBtn" style="display:block;text-align:center;font-size:12px;color:var(--text-muted);text-decoration:none;padding:6px 0;margin-top:2px;" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text-muted)'">Sign out</a>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <span class="page-title">Clients</span>
        <span class="breadcrumb" id="clientCount">Loading…</span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary" onclick="openAddClientModal()">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v10M3 8h10"/></svg>
          Add Client
        </button>
      </div>
    </header>

    <main class="content">
      <!-- Stat row -->
      <div class="stat-grid" style="margin-bottom:24px;" id="statsRow">
        <div class="stat-card"><div class="stat-label">Total Clients</div><div class="stat-value skeleton" style="height:28px;width:60px;"></div></div>
        <div class="stat-card"><div class="stat-label">Active (30d)</div><div class="stat-value skeleton" style="height:28px;width:60px;"></div></div>
        <div class="stat-card"><div class="stat-label">Avg. Lifetime Spend</div><div class="stat-value skeleton" style="height:28px;width:80px;"></div></div>
        <div class="stat-card"><div class="stat-label">VIP Clients</div><div class="stat-value skeleton" style="height:28px;width:40px;"></div></div>
      </div>

      <!-- Filter row -->
      <div class="filter-row">
        <div class="search-wrap" style="flex:1;max-width:320px">
          <svg class="search-icon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" type="search" placeholder="Search clients…" oninput="handleSearch(this.value)" id="clientSearch">
        </div>
        <div style="display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:3px">
          <button class="filter-tab active" onclick="setFilter('all',this)">All</button>
          <button class="filter-tab" onclick="setFilter('active',this)">Active</button>
          <button class="filter-tab" onclick="setFilter('inactive',this)">Inactive</button>
          <button class="filter-tab" onclick="setFilter('vip',this)">VIP</button>
        </div>
      </div>

      <!-- Client grid -->
      <div class="client-grid" id="clientGrid">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </main>
  </div>
</div>

<!-- ADD CLIENT MODAL -->
<div class="modal-overlay" id="addClientModal">
  <div class="modal" style="width:480px;">
    <div class="modal-header">
      <span class="modal-title">Add Client</span>
      <button class="btn-icon" onclick="closeModal('addClientModal')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l10 10M13 3L3 13"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Full Name *</label><input type="text" class="input" id="newClientName" placeholder="Jane Smith" /></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Email</label><input type="email" class="input" id="newClientEmail" placeholder="jane@example.com" /></div>
        <div class="form-group"><label class="form-label">Phone</label><input type="tel" class="input" id="newClientPhone" placeholder="+44 7700 000000" /></div>
      </div>
      <div class="form-group" style="margin-bottom:0;"><label class="form-label">Notes</label><textarea class="textarea" id="newClientNotes" placeholder="Any notes or medical information…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('addClientModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveNewClient()" id="saveClientBtn">Add Client</button>
    </div>
  </div>
</div>

<!-- CLIENT DETAIL MODAL -->
<div class="modal-overlay" id="clientDetailModal">
  <div class="modal" style="width:560px;max-height:80vh;overflow-y:auto;">
    <div class="modal-header">
      <span class="modal-title" id="detailName">Client</span>
      <button class="btn-icon" onclick="closeModal('clientDetailModal')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l10 10M13 3L3 13"/></svg>
      </button>
    </div>
    <div class="modal-body" id="clientDetailBody">
      <div class="skeleton" style="height:80px;margin-bottom:16px;"></div>
      <div class="skeleton" style="height:160px;"></div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
const API    = (location.hostname==='localhost'||location.hostname==='127.0.0.1') ? 'http://localhost:3001' : 'https://medibook-backend-production-dfb2.up.railway.app';
const TOKEN  = localStorage.getItem('medibook_token');
const TENANT = localStorage.getItem('medibook_tenant_id');
if (!TOKEN||!TENANT) { location.href='../pages/login.html'; }
document.getElementById('signOutBtn').addEventListener('click',()=>{ localStorage.clear(); location.href='../pages/login.html'; });
const CLINIC_NAME = localStorage.getItem('medibook_clinic_name') ?? 'Callora';
document.getElementById('sidebarName').textContent = CLINIC_NAME;
document.getElementById('sidebarAv').textContent = CLINIC_NAME.slice(0,2).toUpperCase();

let currentFilter = 'all';
let searchQuery = '';
let searchTimer = null;

async function apiFetch(path) {
  const r = await fetch(API+path,{headers:{Authorization:`Bearer ${TOKEN}`}});
  if (!r.ok) { const e=await r.json().catch(()=>({})); throw new Error(e.error??'API error'); }
  return r.json();
}
async function apiPost(path,body) {
  const r = await fetch(API+path,{method:'POST',headers:{Authorization:`Bearer ${TOKEN}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if (!r.ok) { const e=await r.json().catch(()=>({})); throw new Error(e.error??'API error'); }
  return r.json();
}

async function loadStats() {
  try {
    const s = await apiFetch(`/api/tenants/${TENANT}/clients/stats`);
    document.getElementById('statsRow').innerHTML = `
      <div class="stat-card"><div class="stat-label">Total Clients</div><div class="stat-value">${s.total}</div></div>
      <div class="stat-card"><div class="stat-label">Active (30d)</div><div class="stat-value">${s.activeThisMonth}</div><div class="stat-meta">${s.activeThisMonthDelta>=0?'↑':'↓'} ${Math.abs(s.activeThisMonthDelta)} vs last month</div></div>
      <div class="stat-card"><div class="stat-label">Avg. Lifetime Spend</div><div class="stat-value">${s.avgLifetimeSpend}</div></div>
      <div class="stat-card"><div class="stat-label">VIP Clients</div><div class="stat-value" id="vipCount">—</div></div>`;
  } catch { /* keep skeleton */ }
}

async function loadClients() {
  const params = new URLSearchParams({ filter: currentFilter });
  if (searchQuery) params.set('search', searchQuery);
  try {
    const data = await apiFetch(`/api/tenants/${TENANT}/clients?${params}`);
    document.getElementById('clientCount').textContent = `${data.count} clients`;
    const vipEl = document.getElementById('vipCount');
    if (vipEl) vipEl.textContent = data.clients.filter(c=>c.isVip).length;
    renderClients(data.clients);
  } catch {
    document.getElementById('clientGrid').innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">👤</div><div class="empty-title">Could not load clients</div><div class="empty-text">Check your connection and try again.</div></div>`;
  }
}

function renderClients(clients) {
  const grid = document.getElementById('clientGrid');
  if (!clients.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">👤</div><div class="empty-title">No clients found</div><div class="empty-text">Try a different search or filter.</div></div>`;
    return;
  }
  grid.innerHTML = clients.map(c => `
    <div class="client-card" onclick="openClientDetail('${c.id}')">
      <div class="client-card-head">
        <div class="client-av" style="background:${c.avatarBg};color:${c.avatarColor}">${escHtml(c.initials)}</div>
        <div style="flex:1;min-width:0;">
          <div class="client-name">${escHtml(c.fullName)}</div>
          <div class="client-meta">${escHtml(c.email || c.phone || 'No contact info')}</div>
          <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;">
            ${c.isVip?'<span class="badge badge-gold">⭐ VIP</span>':''}
            <span class="badge ${c.status==='active'?'badge-green':'badge-gray'}">${c.status==='active'?'Active':'Inactive'}</span>
            ${c.noShowCount>0?`<span class="badge badge-red">${c.noShowCount} no-show${c.noShowCount>1?'s':''}</span>`:''}
          </div>
        </div>
      </div>
      <div class="client-stats">
        <div><div class="cs-val">${c.visits}</div><div class="cs-lbl">Visits</div></div>
        <div><div class="cs-val">${c.lifetimeSpend}</div><div class="cs-lbl">Spent</div></div>
        <div><div class="cs-val" style="font-size:12px;font-weight:600;color:var(--text-muted)">${escHtml(c.lastVisit)}</div><div class="cs-lbl">Last Visit</div></div>
      </div>
    </div>`).join('');
}

function handleSearch(q) {
  clearTimeout(searchTimer);
  searchQuery = q;
  searchTimer = setTimeout(loadClients, 300);
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadClients();
}

async function openClientDetail(id) {
  document.getElementById('clientDetailModal').classList.add('open');
  document.getElementById('detailName').textContent = 'Loading…';
  document.getElementById('clientDetailBody').innerHTML = `<div class="skeleton" style="height:80px;margin-bottom:16px;"></div><div class="skeleton" style="height:160px;"></div>`;
  try {
    const c = await apiFetch(`/api/tenants/${TENANT}/clients/${id}`);
    document.getElementById('detailName').textContent = c.fullName;
    document.getElementById('clientDetailBody').innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">
        <div class="client-av" style="background:${c.avatarBg};color:${c.avatarColor};width:52px;height:52px;font-size:18px;">${escHtml(c.initials)}</div>
        <div>
          <div style="font-size:15px;font-weight:700">${escHtml(c.fullName)}</div>
          <div style="font-size:12.5px;color:var(--text-muted)">${escHtml(c.email)} ${c.phone?'· '+escHtml(c.phone):''}</div>
          <div style="margin-top:5px;display:flex;gap:4px;">${c.isVip?'<span class="badge badge-gold">⭐ VIP</span>':''}<span class="badge badge-gray">Client since ${escHtml(c.since)}</span></div>
        </div>
        <div style="margin-left:auto;text-align:right;">
          <div style="font-size:20px;font-weight:700">${escHtml(c.lifetimeSpend)}</div>
          <div style="font-size:11px;color:var(--text-muted)">Lifetime spend</div>
          <div style="font-size:14px;font-weight:700;margin-top:4px">${c.visits}</div>
          <div style="font-size:11px;color:var(--text-muted)">Visits</div>
        </div>
      </div>
      ${c.medicalNotes?`<div style="background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-size:13px;color:var(--text-2);margin-bottom:16px;"><strong>Notes:</strong> ${escHtml(c.medicalNotes)}</div>`:''}
      <div style="font-size:13px;font-weight:700;margin-bottom:10px;">Appointment History</div>
      ${c.history.length ? `
      <div style="border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;">
        ${c.history.map(h=>`
          <div style="display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border);">
            <div style="flex:1;"><div style="font-size:13.5px;font-weight:600">${escHtml(h.serviceName)}</div><div style="font-size:12px;color:var(--text-muted)">${escHtml(h.staffName)} · ${escHtml(h.date)}</div></div>
            <div style="font-weight:700">${escHtml(h.amount)}</div>
            <span class="badge ${h.status==='COMPLETED'?'badge-green':h.status==='CONFIRMED'?'badge-brand':'badge-gray'}">${h.status}</span>
          </div>`).join('')}
      </div>` : '<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:13.5px">No appointment history yet.</div>'}`;
  } catch { document.getElementById('clientDetailBody').innerHTML = '<p style="color:var(--text-muted)">Could not load client details.</p>'; }
}

function openAddClientModal() { document.getElementById('addClientModal').classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

async function saveNewClient() {
  const name  = document.getElementById('newClientName').value.trim();
  const email = document.getElementById('newClientEmail').value.trim();
  const phone = document.getElementById('newClientPhone').value.trim();
  const notes = document.getElementById('newClientNotes').value;
  if (!name) { showToast('Full name is required'); return; }
  const btn = document.getElementById('saveClientBtn');
  btn.disabled=true; btn.textContent='Adding…';
  try {
    await apiPost(`/api/tenants/${TENANT}/clients`, { fullName:name, email:email||undefined, phone:phone||undefined, notes:notes||undefined });
    closeModal('addClientModal');
    showToast('Client added successfully!');
    document.getElementById('newClientName').value=''; document.getElementById('newClientEmail').value='';
    document.getElementById('newClientPhone').value=''; document.getElementById('newClientNotes').value='';
    loadClients(); loadStats();
  } catch (err) { showToast(err.message??'Failed to add client'); }
  finally { btn.disabled=false; btn.textContent='Add Client'; }
}

document.getElementById('addClientModal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal('addClientModal'); });
document.getElementById('clientDetailModal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal('clientDetailModal'); });

function escHtml(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg,type='') {
  const t=document.createElement('div'); t.className='toast '+(type||'');
  t.innerHTML=`<div class="toast-icon">👤</div><div class="toast-content"><div class="toast-title">${escHtml(msg)}</div></div>`;
  document.getElementById('toastWrap').appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),350); },3500);
}

document.addEventListener('DOMContentLoaded',()=>{ loadStats(); loadClients(); });
</script>
</body>
</html>
