<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Callora — Clinic Setup</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0a;--surface:#141414;--surface-2:#1e1e1e;--surface-3:#262626;
  --border:#2a2a2a;--text:#f0f0f0;--text-2:#aaaaaa;--text-muted:#666666;
  --gold:#c9903a;--gold-light:#e8a84a;--green:#22c55e;--red:#ef4444;
  --radius:10px;--shadow:0 2px 12px rgba(0,0,0,0.4);
}
html{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Geist',sans-serif;min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:40px 24px}
.logo{font-family:'Instrument Serif',serif;font-size:24px;color:var(--text);margin-bottom:32px}
.logo span{color:var(--gold)}
.wizard{width:100%;max-width:620px}
.progress{display:flex;align-items:center;gap:6px;margin-bottom:32px}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:2px solid var(--border);color:var(--text-muted);background:var(--surface);flex-shrink:0;transition:all .2s}
.step-dot.active{border-color:var(--gold);color:var(--gold);background:rgba(201,144,58,.12)}
.step-dot.done{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.1)}
.step-line{flex:1;height:2px;background:var(--border);transition:background .2s}
.step-line.done{background:var(--green)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:36px}
.card-title{font-family:'Instrument Serif',serif;font-size:26px;color:var(--text);margin-bottom:6px}
.card-sub{color:var(--text-2);font-size:14px;margin-bottom:28px;line-height:1.6}
.field{margin-bottom:18px}
label{display:block;font-size:13px;font-weight:500;color:var(--text-2);margin-bottom:6px}
input[type=text],input[type=tel],input[type=url],input[type=number],select,textarea{
  width:100%;padding:10px 14px;background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);font-size:14px;font-family:'Geist',sans-serif;
  transition:border-color .15s;outline:none
}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
textarea{resize:vertical;min-height:80px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.check-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.check-row:last-child{border-bottom:none}
.check-row label{margin:0;font-size:14px;color:var(--text);cursor:pointer}
input[type=checkbox]{width:16px;height:16px;accent-color:var(--gold);flex-shrink:0;cursor:pointer}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:8px}
.day-btn{padding:8px 4px;text-align:center;border:1px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;color:var(--text-muted);background:var(--surface-2);transition:all .15s;user-select:none}
.day-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(201,144,58,.12)}
.service-item{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px}
.service-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:10px;align-items:center}
.remove-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;padding:4px;transition:color .15s}
.remove-btn:hover{color:var(--red)}
.add-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px dashed var(--border);border-radius:var(--radius);background:none;color:var(--text-2);font-size:14px;cursor:pointer;transition:all .15s;margin-top:6px}
.add-btn:hover{border-color:var(--gold);color:var(--gold)}
.tone-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tone-card{padding:16px;border:2px solid var(--border);border-radius:10px;cursor:pointer;text-align:center;transition:all .15s;user-select:none}
.tone-card:hover,.tone-card.on{border-color:var(--gold);background:rgba(201,144,58,.07)}
.tone-card .tone-icon{font-size:24px;margin-bottom:6px}
.tone-card .tone-name{font-size:14px;font-weight:600;color:var(--text)}
.tone-card .tone-desc{font-size:11px;color:var(--text-muted);margin-top:3px}
.tag-input-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);min-height:44px;cursor:text}
.tag-input-wrap:focus-within{border-color:var(--gold)}
.tag{background:var(--surface-3);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:12px;display:inline-flex;align-items:center;gap:5px;color:var(--text-2)}
.tag .tag-x{cursor:pointer;color:var(--text-muted);font-size:14px;line-height:1}
.tag .tag-x:hover{color:var(--red)}
.tag-input{background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:'Geist',sans-serif;flex:1;min-width:100px;padding:2px 4px}
.time-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:8px}
.time-sep{text-align:center;color:var(--text-muted);font-size:13px}
.footer{display:flex;justify-content:space-between;align-items:center;margin-top:28px}
.btn{padding:11px 24px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:'Geist',sans-serif}
.btn-back{background:var(--surface-2);color:var(--text-2);border:1px solid var(--border)}
.btn-back:hover{border-color:var(--text-muted);color:var(--text)}
.btn-next{background:var(--gold);color:white}
.btn-next:hover{background:var(--gold-light)}
.btn-next:disabled{opacity:.5;cursor:not-allowed}
.success-screen{text-align:center;padding:60px 40px}
.success-icon{width:64px;height:64px;border-radius:50%;background:rgba(34,197,94,.15);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px}
.success-title{font-family:'Instrument Serif',serif;font-size:30px;margin-bottom:10px}
.success-sub{color:var(--text-2);font-size:15px;line-height:1.7}
.alert{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:16px;display:none}
.alert.show{display:block}
</style>
</head>
<body>

<div class="logo">Cal<span>lora</span></div>

<div class="wizard" id="wizard">
  <!-- Progress dots -->
  <div class="progress" id="progress"></div>

  <!-- Alert -->
  <div class="alert" id="alert"></div>

  <!-- Step container -->
  <div class="card" id="stepCard"></div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const params  = new URLSearchParams(location.search);
const TOKEN   = params.get('token');
const API     = window.location.origin;

let currentStep = 1;
const TOTAL_STEPS = 6;
let formData = { clinicInfo: {}, services: [], consultationRules: {}, callHandling: {}, brandVoice: { tone: 'luxury', wordsToAvoid: [] }, operatingHours: { blackoutDates: [] } };
let tenantName = 'Your Clinic';

// ─── Step titles ──────────────────────────────────────────────────────────────
const STEPS = [
  { title: 'Clinic Information',    sub: 'Tell us about your Med Spa so we can personalise the AI receptionist.' },
  { title: 'Services',              sub: 'Add the treatments and services your clinic offers.' },
  { title: 'Consultation Rules',    sub: 'Configure when and how consultations can be booked.' },
  { title: 'Call Handling',         sub: 'How should the AI handle incoming calls?' },
  { title: 'Brand Voice',           sub: 'Define the tone and personality of your AI receptionist.' },
  { title: 'Operating Hours',       sub: 'Set your weekly schedule and any blackout dates.' },
];

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  if (!TOKEN) { showError('Missing onboarding token. Please log in again.'); return; }
  try {
    const res  = await fetch(`${API}/api/onboarding/${TOKEN}`);
    const data = await res.json();
    if (!res.ok) {
      if (data.redirect) { window.location.href = data.redirect; return; }
      showError(data.error || 'Invalid link.');
      return;
    }
    tenantName = data.tenantName || 'Your Clinic';
    if (data.progress) {
      // Restore progress
      for (let s = 1; s <= TOTAL_STEPS; s++) {
        if (data.progress[`step_${s}`]) {
          Object.assign(getStepData(s), data.progress[`step_${s}`]);
        }
      }
    }
    renderProgress();
    renderStep(currentStep);
  } catch {
    showError('Network error. Please refresh.');
  }
}

function getStepData(s) {
  return [null, formData.clinicInfo, null, formData.consultationRules, formData.callHandling, formData.brandVoice, formData.operatingHours][s] ?? formData.clinicInfo;
}

// ─── Progress ─────────────────────────────────────────────────────────────────
function renderProgress() {
  const el = document.getElementById('progress');
  el.innerHTML = '';
  for (let i = 1; i <= TOTAL_STEPS; i++) {
    if (i > 1) {
      const line = document.createElement('div');
      line.className = 'step-line' + (i <= currentStep ? ' done' : '');
      el.appendChild(line);
    }
    const dot = document.createElement('div');
    dot.className = 'step-dot' + (i === currentStep ? ' active' : (i < currentStep ? ' done' : ''));
    dot.textContent = i < currentStep ? '✓' : i;
    el.appendChild(dot);
  }
}

// ─── Steps ────────────────────────────────────────────────────────────────────
function renderStep(s) {
  renderProgress();
  const card = document.getElementById('stepCard');
  const info = STEPS[s - 1];
  card.innerHTML = `<div class="card-title">${info.title}</div><div class="card-sub">${info.sub}</div><div id="stepBody"></div>`;

  if (s === 1) renderStep1();
  else if (s === 2) renderStep2();
  else if (s === 3) renderStep3();
  else if (s === 4) renderStep4();
  else if (s === 5) renderStep5();
  else if (s === 6) renderStep6();

  const footer = document.createElement('div');
  footer.className = 'footer';
  const back = s > 1 ? `<button class="btn btn-back" onclick="goBack()">← Back</button>` : `<div></div>`;
  const isLast = s === TOTAL_STEPS;
  footer.innerHTML = back + `<button class="btn btn-next" id="nextBtn" onclick="${isLast ? 'submitAll()' : 'goNext()'}">
    ${isLast ? 'Complete Setup →' : 'Save & Continue →'}
  </button>`;
  card.appendChild(footer);
}

function renderStep1() {
  const d = formData.clinicInfo;
  document.getElementById('stepBody').innerHTML = `
    <div class="field"><label>Clinic Name *</label><input type="text" id="s1_name" value="${esc(d.name||tenantName)}" placeholder="Lumière Med Spa"></div>
    <div class="row">
      <div class="field"><label>Phone Number</label><input type="tel" id="s1_phone" value="${esc(d.phone||'')}" placeholder="+1 555 000 0000"></div>
      <div class="field"><label>Timezone</label>
        <select id="s1_tz">${['America/New_York','America/Chicago','America/Denver','America/Los_Angeles','America/Phoenix','Europe/London','Europe/Paris'].map(z=>`<option value="${z}"${d.timezone===z?' selected':''}>${z}</option>`).join('')}</select>
      </div>
    </div>
    <div class="field"><label>Address</label><input type="text" id="s1_addr" value="${esc(d.address||'')}" placeholder="123 Elm St, Beverly Hills, CA 90210"></div>
    <div class="row">
      <div class="field"><label>Website</label><input type="url" id="s1_web" value="${esc(d.website||'')}" placeholder="https://yourspa.com"></div>
      <div class="field"><label>Instagram</label><input type="text" id="s1_ig" value="${esc(d.instagram||'')}" placeholder="@yourspa"></div>
    </div>
  `;
}

function collectStep1() {
  formData.clinicInfo = {
    name:      val('s1_name'),
    phone:     val('s1_phone'),
    timezone:  val('s1_tz'),
    address:   val('s1_addr'),
    website:   val('s1_web'),
    instagram: val('s1_ig'),
  };
  if (!formData.clinicInfo.name) { showAlert('Clinic name is required.'); return false; }
  return true;
}

function renderStep2() {
  const wrap = document.getElementById('stepBody');
  wrap.innerHTML = `<div id="svcList"></div><button class="add-btn" onclick="addService()">+ Add Service</button>`;
  if (!formData.services.length) formData.services = [{ name:'', durationMins: 60, price: 0, consultationRequired: false }];
  renderServices();
}

function renderServices() {
  const list = document.getElementById('svcList');
  list.innerHTML = formData.services.map((s, i) => `
    <div class="service-item">
      <div class="service-row">
        <div><label>Service Name</label><input type="text" id="svc_name_${i}" value="${esc(s.name)}" placeholder="e.g. Botox Consultation" oninput="syncSvc(${i},'name',this.value)"></div>
        <div><label>Duration (min)</label><input type="number" id="svc_dur_${i}" value="${s.durationMins}" min="15" max="480" oninput="syncSvc(${i},'durationMins',+this.value)"></div>
        <div><label>Price ($)</label><input type="number" id="svc_price_${i}" value="${s.price}" min="0" step="5" oninput="syncSvc(${i},'price',+this.value)"></div>
        <button class="remove-btn" onclick="removeService(${i})" title="Remove">×</button>
      </div>
      <div class="check-row" style="margin-top:10px">
        <input type="checkbox" id="svc_consult_${i}" ${s.consultationRequired?'checked':''} onchange="syncSvc(${i},'consultationRequired',this.checked)">
        <label for="svc_consult_${i}">Requires consultation before booking</label>
      </div>
    </div>
  `).join('');
}

function syncSvc(i, k, v) { formData.services[i][k] = v; }
function addService() { formData.services.push({ name:'', durationMins:60, price:0, consultationRequired:false }); renderServices(); }
function removeService(i) { formData.services.splice(i,1); if(!formData.services.length) addService(); else renderServices(); }

function collectStep2() {
  // Sync final values from DOM
  formData.services.forEach((s, i) => {
    s.name = val(`svc_name_${i}`);
    s.durationMins = +val(`svc_dur_${i}`) || 60;
    s.price = +val(`svc_price_${i}`) || 0;
  });
  if (formData.services.every(s => !s.name.trim())) { showAlert('Add at least one service.'); return false; }
  return true;
}

function renderStep3() {
  const d = formData.consultationRules;
  const days = d.availableDays ?? [1,2,3,4,5];
  const blocks = d.timeBlocks ?? [{ start:'09:00', end:'17:00' }];
  document.getElementById('stepBody').innerHTML = `
    <div class="field">
      <label>Default Consultation Duration (minutes)</label>
      <input type="number" id="s3_dur" value="${d.durationMins||30}" min="15" max="120">
    </div>
    <div class="field">
      <label>Available Days</label>
      <div class="days-grid" id="daysGrid">
        ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map((n,i)=>
          `<div class="day-btn${days.includes(i)?' on':''}" data-day="${i}" onclick="toggleDay(this,${i})">${n}</div>`
        ).join('')}
      </div>
    </div>
    <div class="field">
      <label>Time Blocks</label>
      <div id="blocksWrap">${blocks.map((b,i)=>`
        <div class="time-row" id="block_${i}">
          <input type="time" id="block_start_${i}" value="${b.start}">
          <span class="time-sep">to</span>
          <input type="time" id="block_end_${i}" value="${b.end}">
        </div>`).join('')}
      </div>
      <button class="add-btn" onclick="addBlock()">+ Add Time Block</button>
    </div>
    <div class="row">
      <div class="field"><label>Buffer Between Appointments (min)</label><input type="number" id="s3_buf" value="${d.bufferMins||15}" min="0" max="120"></div>
      <div class="field"><label>Max Appointments Per Day</label><input type="number" id="s3_max" value="${d.maxPerDay||10}" min="1" max="100"></div>
    </div>
  `;
}

let _selectedDays = null;
function toggleDay(el, day) {
  if (!_selectedDays) {
    _selectedDays = Array.from(document.querySelectorAll('.day-btn.on')).map(e => +e.dataset.day);
  }
  const idx = _selectedDays.indexOf(day);
  if (idx >= 0) _selectedDays.splice(idx, 1); else _selectedDays.push(day);
  el.classList.toggle('on');
}

let _blockCount = 1;
function addBlock() {
  const wrap = document.getElementById('blocksWrap');
  const i = _blockCount++;
  const div = document.createElement('div');
  div.className = 'time-row';
  div.id = `block_${i}`;
  div.innerHTML = `<input type="time" id="block_start_${i}" value="09:00"><span class="time-sep">to</span><input type="time" id="block_end_${i}" value="17:00">`;
  wrap.appendChild(div);
}

function collectStep3() {
  const days = _selectedDays ?? Array.from(document.querySelectorAll('.day-btn.on')).map(e => +e.dataset.day);
  const blocks = [];
  document.querySelectorAll('[id^="block_start_"]').forEach(el => {
    const i = el.id.split('_').pop();
    const end = document.getElementById(`block_end_${i}`);
    if (el.value && end?.value) blocks.push({ start: el.value, end: end.value });
  });
  formData.consultationRules = {
    availableDays: days,
    timeBlocks:    blocks,
    durationMins:  +val('s3_dur') || 30,
    bufferMins:    +val('s3_buf') || 15,
    maxPerDay:     +val('s3_max') || 10,
  };
  _selectedDays = null;
  return true;
}

function renderStep4() {
  const d = formData.callHandling;
  document.getElementById('stepBody').innerHTML = `
    <div class="field"><label>Transfer Phone Number (for live transfers)</label><input type="tel" id="s4_transfer" value="${esc(d.transferNumber||'')}" placeholder="+1 555 000 0000"></div>
    <div class="field"><label>After-Hours Message</label><textarea id="s4_afterhours" placeholder="We're closed right now. Our hours are Mon–Fri 9am–6pm. Please leave a message or call back during business hours.">${esc(d.afterHoursMessage||'')}</textarea></div>
    <div class="field"><label>Emergency Keywords (comma-separated)</label><input type="text" id="s4_emergency" value="${esc((d.emergencyKeywords||[]).join(', '))}" placeholder="emergency, allergic reaction, severe pain"></div>
    <div class="check-row"><input type="checkbox" id="s4_price" ${d.quotePrices?'checked':''}><label for="s4_price">Allow AI to quote service prices</label></div>
  `;
}

function collectStep4() {
  formData.callHandling = {
    transferNumber:   val('s4_transfer'),
    afterHoursMessage: val('s4_afterhours'),
    emergencyKeywords: val('s4_emergency').split(',').map(s=>s.trim()).filter(Boolean),
    quotePrices:      document.getElementById('s4_price')?.checked || false,
  };
  return true;
}

let _wordsToAvoid = [];
function renderStep5() {
  const d = formData.brandVoice;
  _wordsToAvoid = [...(d.wordsToAvoid || [])];
  document.getElementById('stepBody').innerHTML = `
    <div class="field">
      <label>Tone</label>
      <div class="tone-grid">
        <div class="tone-card${d.tone==='luxury'?' on':''}" data-tone="luxury" onclick="selectTone('luxury')">
          <div class="tone-icon">✨</div><div class="tone-name">Luxury</div><div class="tone-desc">Elevated, sophisticated language</div>
        </div>
        <div class="tone-card${d.tone==='friendly'?' on':''}" data-tone="friendly" onclick="selectTone('friendly')">
          <div class="tone-icon">😊</div><div class="tone-name">Friendly</div><div class="tone-desc">Warm, approachable and casual</div>
        </div>
        <div class="tone-card${d.tone==='clinical'?' on':''}" data-tone="clinical" onclick="selectTone('clinical')">
          <div class="tone-icon">🏥</div><div class="tone-name">Clinical</div><div class="tone-desc">Professional and precise</div>
        </div>
      </div>
    </div>
    <div class="field">
      <label>Words / Phrases to Avoid</label>
      <div class="tag-input-wrap" id="tagWrap" onclick="document.getElementById('tagInput').focus()">
        ${_wordsToAvoid.map(w=>`<span class="tag">${esc(w)}<span class="tag-x" onclick="removeWord('${esc(w)}')">×</span></span>`).join('')}
        <input class="tag-input" id="tagInput" placeholder="Type and press Enter…" onkeydown="tagKeydown(event)">
      </div>
    </div>
    <div class="field"><label>Special Notes for the AI</label><textarea id="s5_notes" placeholder="e.g. Never discuss competitors. Always recommend a consultation for new clients.">${esc(d.specialNotes||'')}</textarea></div>
  `;
}

function selectTone(t) {
  document.querySelectorAll('.tone-card').forEach(c => c.classList.toggle('on', c.dataset.tone === t));
  formData.brandVoice.tone = t;
}

function tagKeydown(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const v = e.target.value.trim().replace(/,$/,'');
    if (v && !_wordsToAvoid.includes(v)) {
      _wordsToAvoid.push(v);
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.innerHTML = `${esc(v)}<span class="tag-x" onclick="removeWord('${esc(v)}')">×</span>`;
      e.target.before(tag);
    }
    e.target.value = '';
  }
}

function removeWord(w) {
  _wordsToAvoid = _wordsToAvoid.filter(x => x !== w);
  renderStep5();
}

function collectStep5() {
  const tone = document.querySelector('.tone-card.on')?.dataset.tone || 'luxury';
  formData.brandVoice = { tone, wordsToAvoid: _wordsToAvoid, specialNotes: val('s5_notes') };
  return true;
}

let _blackoutDates = [];
function renderStep6() {
  const d = formData.operatingHours;
  _blackoutDates = [...(d.blackoutDates || [])];
  document.getElementById('stepBody').innerHTML = `
    <div class="field">
      <label>Weekly Operating Hours</label>
      ${['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'].map((day,i)=>`
        <div class="check-row">
          <input type="checkbox" id="oh_open_${i}" ${(d.schedule||{})[i]?.open!==false?'checked':''} onchange="toggleOHDay(${i})">
          <label for="oh_open_${i}" style="min-width:90px">${day}</label>
          <input type="time" id="oh_start_${i}" value="${(d.schedule||{})[i]?.start||'09:00'}" style="width:110px">
          <span style="color:var(--text-muted);font-size:13px;margin:0 6px">–</span>
          <input type="time" id="oh_end_${i}" value="${(d.schedule||{})[i]?.end||'18:00'}" style="width:110px">
        </div>
      `).join('')}
    </div>
    <div class="field">
      <label>Blackout / Holiday Dates</label>
      <div id="bdList">${_blackoutDates.map((d,i)=>`
        <div class="service-row" id="bd_${i}" style="margin-bottom:8px">
          <input type="date" id="bd_date_${i}" value="${d.date}" onchange="syncBd(${i},'date',this.value)">
          <input type="text" id="bd_label_${i}" value="${esc(d.label||'')}" placeholder="e.g. Thanksgiving" onchange="syncBd(${i},'label',this.value)">
          <div></div>
          <button class="remove-btn" onclick="removeBd(${i})">×</button>
        </div>
      `).join('')}</div>
      <button class="add-btn" onclick="addBd()">+ Add Date</button>
    </div>
  `;
}

function toggleOHDay(i) {
  const open = document.getElementById(`oh_open_${i}`).checked;
  document.getElementById(`oh_start_${i}`).disabled = !open;
  document.getElementById(`oh_end_${i}`).disabled = !open;
}

function addBd() {
  _blackoutDates.push({ date: '', label: '' });
  renderStep6();
}
function removeBd(i) { _blackoutDates.splice(i,1); renderStep6(); }
function syncBd(i,k,v) { _blackoutDates[i][k] = v; }

function collectStep6() {
  const schedule = {};
  for (let i = 0; i < 7; i++) {
    schedule[i] = {
      open:  document.getElementById(`oh_open_${i}`)?.checked ?? true,
      start: val(`oh_start_${i}`) || '09:00',
      end:   val(`oh_end_${i}`) || '18:00',
    };
  }
  _blackoutDates.forEach((d,i) => {
    d.date  = val(`bd_date_${i}`);
    d.label = val(`bd_label_${i}`);
  });
  formData.operatingHours = {
    schedule,
    blackoutDates: _blackoutDates.filter(d => d.date),
  };
  return true;
}

// ─── Navigation ───────────────────────────────────────────────────────────────
async function goNext() {
  hideAlert();
  const ok = collectCurrentStep();
  if (!ok) return;

  await saveProgress(currentStep);
  currentStep++;
  renderStep(currentStep);
  window.scrollTo(0,0);
}

function goBack() {
  hideAlert();
  collectCurrentStep();
  currentStep--;
  renderStep(currentStep);
  window.scrollTo(0,0);
}

function collectCurrentStep() {
  if (currentStep === 1) return collectStep1();
  if (currentStep === 2) return collectStep2();
  if (currentStep === 3) return collectStep3();
  if (currentStep === 4) return collectStep4();
  if (currentStep === 5) return collectStep5();
  if (currentStep === 6) return collectStep6();
  return true;
}

async function saveProgress(step) {
  const data = [null, formData.clinicInfo, formData.services, formData.consultationRules, formData.callHandling, formData.brandVoice, formData.operatingHours][step];
  try {
    await fetch(`${API}/api/onboarding/${TOKEN}/step`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ step, data }),
    });
  } catch { /* non-fatal */ }
}

async function submitAll() {
  hideAlert();
  const ok = collectCurrentStep();
  if (!ok) return;

  const btn = document.getElementById('nextBtn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    const res = await fetch(`${API}/api/onboarding/${TOKEN}/submit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(formData),
    });
    const data = await res.json();
    if (!res.ok) { showAlert(data.error || 'Submission failed. Please try again.'); btn.disabled=false; btn.textContent='Complete Setup →'; return; }
    showSuccess();
  } catch {
    showAlert('Network error. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Complete Setup →';
  }
}

function showSuccess() {
  document.getElementById('progress').style.display = 'none';
  document.getElementById('stepCard').innerHTML = `
    <div class="success-screen">
      <div class="success-icon">✓</div>
      <div class="success-title">Setup Complete!</div>
      <p class="success-sub">Your clinic has been configured. A member of the Callora team will review your setup and reach out within 1 business day to get your AI receptionist live.</p>
      <p style="margin-top:24px"><a href="/app/dashboard.html" style="background:var(--gold);color:white;padding:12px 24px;border-radius:var(--radius);text-decoration:none;font-weight:600;font-size:14px">Go to Dashboard →</a></p>
    </div>
  `;
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function val(id) { return document.getElementById(id)?.value?.trim() || ''; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function showAlert(msg) { const el=document.getElementById('alert'); el.textContent=msg; el.classList.add('show'); }
function hideAlert() { document.getElementById('alert').classList.remove('show'); }
function showError(msg) {
  document.getElementById('wizard').innerHTML = `<div class="card" style="text-align:center;padding:48px"><p style="color:var(--red);font-size:15px">${esc(msg)}</p><p style="margin-top:16px"><a href="/pages/login.html" style="color:var(--gold)">Back to login</a></p></div>`;
}

// ─── Start ────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
