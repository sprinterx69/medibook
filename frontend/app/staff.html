<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff — Callora</title>
<link rel="stylesheet" href="styles.css">
<style>
.staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.staff-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 22px; box-shadow: var(--shadow-xs); transition: box-shadow 0.2s, border-color 0.2s; }
.staff-card:hover { box-shadow: var(--shadow); border-color: var(--border-strong); }
.staff-card-head { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px; }
.staff-av { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; flex-shrink: 0; }
.staff-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.2; }
.staff-role { font-size: 12.5px; color: var(--text-muted); margin-top: 3px; }
.staff-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.metric-val { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1; }
.metric-lbl { font-size: 11px; color: var(--text-muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
.util-bar-wrap { height: 6px; background: var(--surface-3); border-radius: 3px; margin-top: 8px; overflow: hidden; }
.util-bar { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
.staff-actions { display: flex; gap: 8px; margin-top: 14px; }
.filter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.role-tab { padding:5px 14px;border-radius:6px;border:none;background:none;font-family:inherit;font-size:12.5px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all 0.15s }
.role-tab.active { background:var(--surface);color:var(--text);border:1px solid var(--border);box-shadow:var(--shadow-xs) }
.role-tab:hover:not(.active) { color:var(--text-2) }
@keyframes shimmer { 0%{background-position:-200px 0} 100%{background-position:calc(200px + 100%) 0} }
.skeleton { background: linear-gradient(90deg,var(--surface-2) 25%,var(--surface-3) 50%,var(--surface-2) 75%); background-size:200px 100%; animation: shimmer 1.3s infinite; border-radius: var(--radius-lg); height: 220px; }
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidebar">
  <div class="sidebar-logo"><div class="logo-mark">C</div><span class="logo-text">Callora</span></div>
  <div class="sidebar-scroll">
    <div class="nav-section">Clinic</div>
    <a href="dashboard.html" class="nav-item">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1" y="1" width="6" height="6" rx="1.2"/><rect x="9" y="1" width="6" height="6" rx="1.2"/><rect x="1" y="9" width="6" height="6" rx="1.2"/><rect x="9" y="9" width="6" height="6" rx="1.2"/></svg>Overview</a>
    <a href="calendar.html" class="nav-item">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1.5" y="2.5" width="13" height="12" rx="1.5"/><path d="M5 1v3M11 1v3M1.5 6.5h13"/></svg>Calendar</a>
    <a href="bookings.html" class="nav-item">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2H4a1 1 0 00-1 1v10a1 1 0 001 1h8a1 1 0 001-1V3a1 1 0 00-1-1z"/><path d="M5 6h6M5 9h4"/></svg>Bookings</a>
    <a href="calls.html" class="nav-item">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M13 10.5c0 .276-.06.536-.168.77A2.5 2.5 0 0110.5 13c-4.142 0-7.5-3.358-7.5-7.5A2.5 2.5 0 015.23 3.168C5.464 3.06 5.724 3 6 3c.138 0 .25.112.25.25v.002l.75 3a.25.25 0 01-.062.244L5.75 7.684a7.04 7.04 0 002.566 2.566l1.188-1.188a.25.25 0 01.244-.062l3 .75c.138.034.252.15.252.25z"/></svg>Calls</a>
    <a href="performance.html" class="nav-item">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><polyline points="2,12 6,8 9,11 14,5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 14h12"/></svg>Performance</a>
    <div class="nav-section">Settings</div>
    <a href="settings.html" class="nav-item">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="2.2"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M2.697 2.697l1.06 1.06M12.243 12.243l1.06 1.06M13.303 2.697l-1.06 1.06M3.757 12.243l-1.06 1.06"/></svg>Settings</a>
  </div>
  <div class="sidebar-footer">
    <div class="user-card">
      <div class="user-av" id="sidebarAv">—</div>
      <div><div class="user-name" id="sidebarName">Loading…</div><div class="user-role">Clinic Owner</div></div>
    </div>
    <a href="#" id="signOutBtn" style="display:block;text-align:center;font-size:12px;color:var(--text-muted);text-decoration:none;padding:6px 0;margin-top:2px;" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text-muted)'">Sign out</a>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <span class="page-title">Staff</span>
      <span class="breadcrumb" id="staffCount">Loading…</span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-primary" onclick="openInviteModal()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Invite Staff
      </button>
    </div>
  </div>

  <div class="content">
    <div class="stat-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:24px;" id="statsRow">
      <div class="stat-card"><div class="stat-label">On Duty Today</div><div class="stat-value">—</div></div>
      <div class="stat-card"><div class="stat-label">Total Staff</div><div class="stat-value">—</div></div>
      <div class="stat-card"><div class="stat-label">Appts Today</div><div class="stat-value">—</div></div>
      <div class="stat-card"><div class="stat-label">Active Staff</div><div class="stat-value">—</div></div>
    </div>

    <div class="filter-row">
      <div class="search-wrap" style="flex:1;max-width:280px">
        <svg class="search-icon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" type="search" placeholder="Search staff…" oninput="filterStaff(this.value)" id="staffSearch">
      </div>
      <div style="display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:3px">
        <button class="role-tab active" onclick="setRoleFilter('all',this)">All</button>
        <button class="role-tab" onclick="setRoleFilter('online',this)">On Duty</button>
        <button class="role-tab" onclick="setRoleFilter('offline',this)">Off Today</button>
      </div>
    </div>

    <div class="staff-grid" id="staffGrid">
      <div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div>
    </div>
  </div>
</div>

<!-- Invite Modal -->
<div class="modal-overlay" id="inviteModal">
  <div class="modal" style="width:480px">
    <div class="modal-header">
      <span class="modal-title">Invite a Team Member</span>
      <button class="btn-icon btn-sm" onclick="closeModal('inviteModal')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Full Name *</label><input class="input" type="text" id="inviteName" placeholder="Dr. Jane Smith"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Email Address *</label><input class="input" type="email" id="inviteEmail" placeholder="jane@clinic.com"></div>
        <div class="form-group"><label class="form-label">Role / Title</label><input class="input" type="text" id="inviteTitle" placeholder="Senior Aesthetician"></div>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Permission Level</label>
        <select class="select" id="inviteRole">
          <option value="MEMBER">Staff — Can manage own appointments only</option>
          <option value="ADMIN">Admin — Full access including billing</option>
        </select>
        <div class="form-hint">An invite email will be sent with a link to set their password.</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('inviteModal')">Cancel</button>
      <button class="btn btn-primary" onclick="sendInvite()" id="inviteBtn">Send Invite</button>
    </div>
  </div>
</div>

<div class="toast-wrap"><div class="toast" id="toast"><span class="toast-icon" id="toastIcon">✓</span><div class="toast-content"><div class="toast-title" id="toastTitle"></div><div class="toast-msg" id="toastMsg"></div></div></div></div>

<script>
const API    = (location.hostname==='localhost'||location.hostname==='127.0.0.1')?'http://localhost:3001':'https://medibook-backend-production-dfb2.up.railway.app';
const TOKEN  = localStorage.getItem('medibook_token');
const TENANT = localStorage.getItem('medibook_tenant_id');
if(!TOKEN||!TENANT){location.href='../pages/login.html';}
document.getElementById('signOutBtn').addEventListener('click',()=>{localStorage.clear();location.href='../pages/login.html';});
const CN=localStorage.getItem('medibook_clinic_name')??'Callora';
document.getElementById('sidebarName').textContent=CN;
document.getElementById('sidebarAv').textContent=CN.slice(0,2).toUpperCase();

let allStaff=[],activeFilter='all';

async function apiFetch(p){const r=await fetch(API+p,{headers:{Authorization:`Bearer ${TOKEN}`}});if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error??'API error');}return r.json();}
async function apiPost(p,body){const r=await fetch(API+p,{method:'POST',headers:{Authorization:`Bearer ${TOKEN}`,'Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error??'API error');}return r.json();}

async function loadStaff(){
  try{
    const[staffData,onDuty]=await Promise.all([
      apiFetch(`/api/tenants/${TENANT}/staff`),
      apiFetch(`/api/tenants/${TENANT}/staff/on-duty`),
    ]);
    const onDutyIds=new Set((onDuty.staff||[]).map(s=>s.id));
    const todayCounts={};(onDuty.staff||[]).forEach(s=>{todayCounts[s.id]=s.appointmentsToday||0;});
    allStaff=(staffData.staff||[]).map(s=>({...s,online:onDutyIds.has(s.id),today:todayCounts[s.id]??0}));
    const totalToday=Object.values(todayCounts).reduce((a,b)=>a+b,0);
    document.getElementById('statsRow').innerHTML=`
      <div class="stat-card"><div class="stat-label">On Duty Today</div><div class="stat-value">${onDuty.onlineCount??0}</div><div class="stat-meta">of ${allStaff.length} staff</div></div>
      <div class="stat-card"><div class="stat-label">Total Staff</div><div class="stat-value">${allStaff.length}</div></div>
      <div class="stat-card"><div class="stat-label">Appts Today</div><div class="stat-value">${totalToday}</div></div>
      <div class="stat-card"><div class="stat-label">Active Staff</div><div class="stat-value">${allStaff.filter(s=>s.isAvailable!==false).length}</div></div>`;
    document.getElementById('staffCount').textContent=`${allStaff.length} team members`;
    filterStaff(document.getElementById('staffSearch').value);
  }catch{
    document.getElementById('staffGrid').innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">👥</div><div class="empty-title">Could not load staff</div><div class="empty-text">Check your connection.</div></div>';
  }
}

function renderStaff(list){
  const grid=document.getElementById('staffGrid');
  if(!list.length){grid.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">👤</div><div class="empty-title">No staff found</div><div class="empty-text">Try a different search.</div></div>';return;}
  grid.innerHTML=list.map(s=>{
    const util=s.today>0?Math.min(100,s.today*20):0;
    const utilColor=util>=80?'var(--green)':util>=50?'var(--gold)':'var(--text-muted)';
    const ini=(s.name||'').split(' ').slice(0,2).map(w=>w[0]?.toUpperCase()??'').join('');
    const bg=s.color?s.color+'22':'#f0fdfa';const col=s.color??'#115e59';
    return`<div class="staff-card">
      <div class="staff-card-head">
        <div class="staff-av" style="background:${bg};color:${col}">${escHtml(ini)}</div>
        <div style="flex:1;min-width:0">
          <div class="staff-name">${escHtml(s.name)}</div>
          <div class="staff-role">${escHtml(s.title||s.role||'')}</div>
          <div style="margin-top:6px"><span class="badge ${s.online?'badge-green':'badge-gray'} badge-dot">${s.online?'On Duty':'Off Today'}</span></div>
        </div>
      </div>
      <div class="staff-metrics">
        <div class="metric-item"><div class="metric-val">${s.today}</div><div class="metric-lbl">Today's Appts</div></div>
        <div class="metric-item"><div class="metric-val">${util}%</div><div class="metric-lbl">Utilisation</div></div>
      </div>
      <div class="util-bar-wrap" style="margin-top:8px"><div class="util-bar" style="width:${util}%;background:${utilColor}"></div></div>
      <div style="margin-top:10px">
        <div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Services</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">
          ${(s.services||[]).slice(0,4).map(sv=>`<span class="badge badge-gray">${escHtml(sv)}</span>`).join('')}
          ${(s.services||[]).length>4?`<span class="badge badge-gray">+${s.services.length-4}</span>`:''}
          ${!(s.services||[]).length?'<span style="font-size:12px;color:var(--text-muted)">No services listed</span>':''}
        </div>
      </div>
      <div class="staff-actions">
        <button class="btn btn-secondary btn-sm" style="flex:1" onclick="showToast('info','Schedule','Coming soon')">Schedule</button>
        <button class="btn btn-ghost btn-sm" onclick="showToast('info','Profile','Coming soon')">Profile</button>
      </div>
    </div>`;
  }).join('');
}

function filterStaff(q){
  const list=allStaff.filter(s=>{
    const mq=!q||s.name.toLowerCase().includes(q.toLowerCase())||(s.title||'').toLowerCase().includes(q.toLowerCase());
    const mf=activeFilter==='all'||(activeFilter==='online'&&s.online)||(activeFilter==='offline'&&!s.online);
    return mq&&mf;
  });
  renderStaff(list);
}

function setRoleFilter(f,btn){
  activeFilter=f;document.querySelectorAll('.role-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  filterStaff(document.getElementById('staffSearch').value);
}

function openInviteModal(){document.getElementById('inviteModal').classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

async function sendInvite(){
  const name=document.getElementById('inviteName').value.trim();
  const email=document.getElementById('inviteEmail').value.trim();
  const title=document.getElementById('inviteTitle').value.trim();
  const role=document.getElementById('inviteRole').value;
  if(!name||!email){showToast('error','Missing fields','Name and email are required.');return;}
  const btn=document.getElementById('inviteBtn');btn.disabled=true;btn.textContent='Sending…';
  try{
    await apiPost(`/api/tenants/${TENANT}/team/invite`,{fullName:name,email,title,role});
    closeModal('inviteModal');showToast('success','Invite sent',`Sent to ${email}.`);
    document.getElementById('inviteName').value='';document.getElementById('inviteEmail').value='';document.getElementById('inviteTitle').value='';
    loadStaff();
  }catch(err){showToast('error','Invite failed',err.message??'Please try again.');}
  finally{btn.disabled=false;btn.textContent='Send Invite';}
}

let toastTimer;
function showToast(type,title,msg=''){
  const icons={success:'✓',error:'✕',info:'ℹ'};
  document.getElementById('toastIcon').textContent=icons[type]||'✓';
  document.getElementById('toastTitle').textContent=title;
  document.getElementById('toastMsg').textContent=msg;
  const t=document.getElementById('toast');t.className='toast '+type+' show';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3200);
}

function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

document.addEventListener('DOMContentLoaded',loadStaff);
</script>
</body>
</html>
