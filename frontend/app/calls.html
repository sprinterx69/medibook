<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calls — Callora</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">C</div>
      <span class="logo-text">Callora</span>
    </div>
    <div class="sidebar-scroll">
      <div class="nav-section">Clinic</div>
      <a href="dashboard.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1" y="1" width="6" height="6" rx="1.2"/><rect x="9" y="1" width="6" height="6" rx="1.2"/><rect x="1" y="9" width="6" height="6" rx="1.2"/><rect x="9" y="9" width="6" height="6" rx="1.2"/></svg>
        Overview
      </a>
      <a href="calendar.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1.5" y="2.5" width="13" height="12" rx="1.5"/><path d="M5 1v3M11 1v3M1.5 6.5h13"/></svg>
        Calendar
      </a>
      <a href="bookings.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2H4a1 1 0 00-1 1v10a1 1 0 001 1h8a1 1 0 001-1V3a1 1 0 00-1-1z"/><path d="M5 6h6M5 9h4"/></svg>
        Bookings
      </a>
      <a href="calls.html" class="nav-item active">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M13 10.5c0 .276-.06.536-.168.77A2.5 2.5 0 0110.5 13c-4.142 0-7.5-3.358-7.5-7.5A2.5 2.5 0 015.23 3.168C5.464 3.06 5.724 3 6 3c.138 0 .25.112.25.25v.002l.75 3a.25.25 0 01-.062.244L5.75 7.684a7.04 7.04 0 002.566 2.566l1.188-1.188a.25.25 0 01.244-.062l3 .75c.138.034.252.15.252.25z"/></svg>
        Calls
      </a>
      <a href="performance.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><polyline points="2,12 6,8 9,11 14,5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 14h12"/></svg>
        Performance
      </a>
      <div class="nav-section">Settings</div>
      <a href="settings.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="2.2"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M2.697 2.697l1.06 1.06M12.243 12.243l1.06 1.06M13.303 2.697l-1.06 1.06M3.757 12.243l-1.06 1.06"/></svg>
        Settings
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-av" id="userAv">--</div>
        <div>
          <div class="user-name" id="userName">Loading…</div>
          <div class="user-role">Clinic Owner</div>
        </div>
      </div>
      <a href="#" id="signOutBtn" style="display:block;text-align:center;font-size:12px;color:var(--text-muted);text-decoration:none;padding:6px 0;margin-top:2px;" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text-muted)'">Sign out</a>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <span class="page-title">Call Logs</span>
      </div>
      <div class="topbar-right">
        <span id="dateRange" style="font-size:13px;color:var(--text-muted);font-weight:500;"></span>
      </div>
    </header>

    <main class="content">

      <!-- STAT CARDS -->
      <div class="stat-grid" style="margin-bottom:20px;">
        <div class="stat-card">
          <div class="stat-icon" style="background:#eff6ff;">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="#3b82f6" stroke-width="1.7"><path d="M13 10.5c0 .276-.06.536-.168.77A2.5 2.5 0 0110.5 13c-4.142 0-7.5-3.358-7.5-7.5A2.5 2.5 0 015.23 3.168C5.464 3.06 5.724 3 6 3c.138 0 .25.112.25.25v.002l.75 3a.25.25 0 01-.062.244L5.75 7.684a7.04 7.04 0 002.566 2.566l1.188-1.188a.25.25 0 01.244-.062l3 .75c.138.034.252.15.252.25z"/></svg>
          </div>
          <div class="stat-label">Total Calls</div>
          <div class="stat-value" id="statTotal">—</div>
          <div class="stat-meta" id="statTotalMeta"></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#f0fdf4;">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="#16a34a" stroke-width="1.7"><rect x="1.5" y="2.5" width="13" height="12" rx="1.5"/><path d="M5 1v3M11 1v3M1.5 6.5h13"/></svg>
          </div>
          <div class="stat-label">Bookings Made</div>
          <div class="stat-value" id="statBooked">—</div>
          <div class="stat-meta" id="statBookedMeta"></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#f0fdfa;">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="#0d9488" stroke-width="1.7"><polyline points="2,12 6,8 9,11 14,5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 14h12"/></svg>
          </div>
          <div class="stat-label">Booking Rate</div>
          <div class="stat-value" id="statRate">—</div>
          <div class="stat-meta"></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#f5f3ff;">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="#7c3aed" stroke-width="1.7"><circle cx="8" cy="8" r="6"/><path d="M8 5v3.5l2 2"/></svg>
          </div>
          <div class="stat-label">Avg Duration</div>
          <div class="stat-value" id="statAvgDur">—</div>
          <div class="stat-meta"></div>
        </div>
      </div>

      <!-- FILTER -->
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
        <div class="tabs" style="margin-bottom:0;border:none;">
          <button class="tab active" onclick="setOutcomeFilter('all',this)">All</button>
          <button class="tab" onclick="setOutcomeFilter('booked',this)">Booked</button>
          <button class="tab" onclick="setOutcomeFilter('info',this)">Info Only</button>
          <button class="tab" onclick="setOutcomeFilter('no_action',this)">No Action</button>
        </div>
        <div style="margin-left:auto;">
          <div class="search-wrap" style="width:220px;">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="6.5" cy="6.5" r="4"/><path d="M11 11l3 3"/></svg>
            <input type="text" class="search-input" id="searchInput" placeholder="Search caller…" oninput="applyFilter()" />
          </div>
        </div>
      </div>

      <!-- TABLE -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date &amp; Time</th>
              <th>Caller</th>
              <th>Duration</th>
              <th>Outcome</th>
              <th>Booking Created</th>
              <th>Sentiment</th>
            </tr>
          </thead>
          <tbody id="callsTbody">
            <tr><td colspan="6" style="padding:40px;text-align:center;color:var(--text-muted);">Loading call logs…</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
const API    = (location.hostname==='localhost'||location.hostname==='127.0.0.1') ? 'http://localhost:3001' : 'https://medibook-backend-production-dfb2.up.railway.app';
const TOKEN  = localStorage.getItem('medibook_token');
const TENANT = localStorage.getItem('medibook_tenant_id');
const CLINIC = localStorage.getItem('medibook_tenant_name') || 'My Clinic';

if (!TOKEN||!TENANT) location.href='/pages/login.html';
document.getElementById('userName').textContent = CLINIC;
document.getElementById('userAv').textContent   = CLINIC.slice(0,2).toUpperCase();
document.getElementById('signOutBtn').addEventListener('click', e=>{ e.preventDefault(); localStorage.clear(); location.href='/pages/login.html'; });

function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let allCalls = [];
let outcomeFilter = 'all';

function setOutcomeFilter(f, btn) {
  outcomeFilter = f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allCalls.filter(c => {
    if (outcomeFilter!=='all' && c.outcome!==outcomeFilter) return false;
    if (q && !(c.callerNumber??'').toLowerCase().includes(q) && !(c.callerName??'').toLowerCase().includes(q)) return false;
    return true;
  });
  renderTable(filtered);
}

function outcomeBadge(o) {
  return ({
    'booked':    '<span class="badge badge-green">Booked</span>',
    'info':      '<span class="badge badge-blue">Info Only</span>',
    'no_action': '<span class="badge badge-gray">No Action</span>',
    'voicemail': '<span class="badge badge-gold">Voicemail</span>',
  }[o] ?? `<span class="badge badge-gray">${esc(o??'Unknown')}</span>`);
}

function sentimentBadge(s) {
  if (!s) return '—';
  return ({
    'positive': '<span class="badge badge-green">Positive</span>',
    'neutral':  '<span class="badge badge-gray">Neutral</span>',
    'negative': '<span class="badge badge-red">Negative</span>',
  }[s.toLowerCase()] ?? `<span class="badge badge-gray">${esc(s)}</span>`);
}

function fmtDuration(secs) {
  if (!secs) return '—';
  const m = Math.floor(secs/60), s = secs%60;
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

function renderTable(calls) {
  const tbody = document.getElementById('callsTbody');
  if (!calls.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📞</div><div class="empty-title">No calls found</div><div class="empty-text">Call logs will appear here once your AI agent starts receiving calls.</div></div></td></tr>`;
    return;
  }
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  tbody.innerHTML = calls.map(c => {
    const d = new Date(c.startedAt ?? c.createdAt);
    const t = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const dateStr = `${days[d.getDay()]} ${d.getDate()} ${d.toLocaleDateString('en-GB',{month:'short'})}, ${t}`;
    const caller  = c.callerName ? `${esc(c.callerName)}<br><span style="font-size:11.5px;color:var(--text-muted);">${esc(c.callerNumber??'')}</span>` : esc(c.callerNumber??'Unknown');
    const booking = c.appointmentId ? `<span class="badge badge-brand">Created</span>` : '—';
    return `<tr>
      <td style="font-variant-numeric:tabular-nums;">${esc(dateStr)}</td>
      <td>${caller}</td>
      <td>${fmtDuration(c.durationSeconds)}</td>
      <td>${outcomeBadge(c.outcome)}</td>
      <td>${booking}</td>
      <td>${sentimentBadge(c.sentiment)}</td>
    </tr>`;
  }).join('');
}

function renderStats(calls) {
  const booked  = calls.filter(c=>c.outcome==='booked'||c.appointmentId).length;
  const durSecs = calls.filter(c=>c.durationSeconds).map(c=>c.durationSeconds);
  const avgDur  = durSecs.length ? Math.round(durSecs.reduce((a,b)=>a+b,0)/durSecs.length) : 0;
  const rate    = calls.length ? Math.round(booked/calls.length*100)+'%' : '0%';
  document.getElementById('statTotal').textContent   = calls.length;
  document.getElementById('statBooked').textContent  = booked;
  document.getElementById('statRate').textContent    = rate;
  document.getElementById('statAvgDur').textContent  = fmtDuration(avgDur);
  if (calls.length>0) {
    document.getElementById('statTotalMeta').innerHTML  = `<span style="color:var(--text-muted);">this period</span>`;
    document.getElementById('statBookedMeta').innerHTML = `<span class="stat-up">↑ ${rate}</span> <span style="color:var(--text-muted);">conversion</span>`;
  }
}

async function loadCalls() {
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
  document.getElementById('dateRange').textContent = `${now.toLocaleDateString('en-GB',{month:'long',year:'numeric'})}`;
  try {
    const data = await fetch(`${API}/api/tenants/${TENANT}/calls?start=${start}`, { headers:{Authorization:`Bearer ${TOKEN}`} });
    if (!data.ok) throw new Error(`HTTP ${data.status}`);
    const json = await data.json();
    allCalls = json.calls ?? [];
    renderStats(allCalls);
    applyFilter();
  } catch (err) {
    // Endpoint may not exist yet — show graceful empty state
    allCalls = [];
    renderStats([]);
    document.getElementById('callsTbody').innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📞</div><div class="empty-title">No call data yet</div><div class="empty-text">Once your AI voice agent is active, call logs will appear here automatically.</div></div></td></tr>`;
  }
}

loadCalls();
</script>
</body>
</html>
