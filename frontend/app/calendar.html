<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar — Callora</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .cal-wrap { display: grid; grid-template-columns: 75% 25%; gap: 0; }
    .cal-grid-area { overflow-x: auto; }
    .cal-side { border-left: 1px solid var(--border); display: flex; flex-direction: column; }
    .week-grid { display: flex; flex-direction: column; min-width: 580px; }
    .week-header { display: grid; grid-template-columns: 52px repeat(6, 1fr); border-bottom: 1px solid var(--border); background: var(--surface-2); }
    .week-header-spacer { border-right: 1px solid var(--border); }
    .day-col-header { text-align: center; padding: 10px 4px; font-size: 12px; font-weight: 600; color: var(--text-muted); border-right: 1px solid var(--border); cursor: pointer; }
    .day-col-header:last-child { border-right: none; }
    .day-col-header.today { background: var(--brand-dim); color: var(--brand-text); }
    .day-num { font-size: 18px; font-weight: 700; display: block; line-height: 1.2; color: var(--text); }
    .day-col-header.today .day-num { color: var(--brand); }
    .week-body { display: flex; position: relative; }
    .time-col { width: 52px; flex-shrink: 0; border-right: 1px solid var(--border); }
    .time-label { height: 52px; display: flex; align-items: flex-start; justify-content: flex-end; padding-right: 8px; padding-top: 4px; font-size: 11px; color: var(--text-light); font-variant-numeric: tabular-nums; border-bottom: 1px solid var(--border); }
    .days-area { flex: 1; display: grid; grid-template-columns: repeat(6, 1fr); position: relative; }
    .day-column { border-right: 1px solid var(--border); position: relative; }
    .day-column:last-child { border-right: none; }
    .day-column.today { background: rgba(13,148,136,0.02); }
    .hour-cell { height: 52px; border-bottom: 1px solid var(--border); }
    .appt-block { position: absolute; left: 4px; right: 4px; border-radius: 6px; border-left-width: 3px; border-left-style: solid; padding: 5px 7px; cursor: pointer; overflow: hidden; transition: filter 0.15s, transform 0.1s; z-index: 2; }
    .appt-block:hover { filter: brightness(0.96); transform: scale(1.01); }
    .appt-name { font-size: 11.5px; font-weight: 700; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .appt-service { font-size: 10.5px; opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .appt-time-lbl { font-size: 10px; opacity: 0.7; margin-top: 2px; }
    .cal-side-section { padding: 16px; border-bottom: 1px solid var(--border); }
    .cal-side-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
    .mini-cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; }
    .mini-cal-day-name { text-align: center; font-size: 10px; font-weight: 700; color: var(--text-light); padding: 3px 0; }
    .mini-cal-day { text-align: center; font-size: 11.5px; padding: 4px 2px; border-radius: 4px; cursor: pointer; color: var(--text-2); transition: background 0.1s; }
    .mini-cal-day:hover { background: var(--surface-2); }
    .mini-cal-day.in-week { background: var(--brand-dim); color: var(--brand-text); font-weight: 600; }
    .mini-cal-day.today { background: var(--brand); color: #fff; font-weight: 700; }
    .mini-cal-day.other-month { color: var(--text-light); }
    .toggle-group { display: flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .toggle-btn { flex: 1; padding: 6px 14px; font-family: inherit; font-size: 12.5px; font-weight: 600; background: var(--surface); border: none; cursor: pointer; color: var(--text-muted); transition: background 0.15s, color 0.15s; }
    .toggle-btn.active { background: var(--brand); color: #fff; }
    .toggle-btn:not(:last-child) { border-right: 1px solid var(--border); }
    .week-nav { display: flex; align-items: center; gap: 8px; }
    .week-label { font-size: 13px; font-weight: 600; color: var(--text); min-width: 160px; text-align: center; }
    .upcoming-section { margin-top: 20px; }
    .upcoming-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg) var(--radius-lg) 0 0; cursor: pointer; }
    .upcoming-body { border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius-lg) var(--radius-lg); overflow: hidden; }
    .now-line { position: absolute; left: 0; right: 0; height: 2px; background: var(--red); z-index: 3; pointer-events: none; }
    .now-line::before { content: ''; position: absolute; left: -4px; top: -4px; width: 10px; height: 10px; border-radius: 50%; background: var(--red); }
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">C</div>
      <span class="logo-text">Callora</span>
    </div>
    <div class="sidebar-scroll">
      <div class="nav-section">Main</div>
      <a href="dashboard.html" class="nav-item">

      <a href="agent.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M13 10.5c0 .276-.06.536-.168.77A2.5 2.5 0 0110.5 13c-4.142 0-7.5-3.358-7.5-7.5A2.5 2.5 0 015.23 3.168C5.464 3.06 5.724 3 6 3c.138 0 .25.112.25.25v.002l.75 3a.25.25 0 01-.062.244L5.75 7.684a7.04 7.04 0 002.566 2.566l1.188-1.188a.25.25 0 01.244-.062l3 .75c.138.034.252.15.252.25z"/></svg>
        AI Agent
        <span class="nav-badge green">Live</span>
      </a>
      <a href="settings.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="2.2"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M2.697 2.697l1.06 1.06M12.243 12.243l1.06 1.06M13.303 2.697l-1.06 1.06M3.757 12.243l-1.06 1.06"/></svg>
        Settings

    </div>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-av" id="sidebarAv">—</div>
        <div>
          <div class="user-name" id="sidebarName">Loading…</div>
          <div class="user-role">Clinic Owner</div>
        </div>
      </div>
      <a href="#" id="signOutBtn" style="display:block;text-align:center;font-size:12px;color:var(--text-muted);text-decoration:none;padding:6px 0;margin-top:2px;" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text-muted)'">Sign out</a>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <span class="page-title">Calendar</span>
        <div style="width:1px;height:22px;background:var(--border);margin:0 4px;"></div>
        <div class="week-nav">
          <button class="btn btn-secondary btn-sm" onclick="prevWeek()">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M10 3L5 8l5 5"/></svg>
          </button>
          <span class="week-label" id="weekLabel">Loading…</span>
          <button class="btn btn-secondary btn-sm" onclick="nextWeek()">

          </button>

      </div>
      <div class="topbar-right">
        <div class="toggle-group">
          <button class="toggle-btn" onclick="setView('day',this)">Day</button>

        <button class="btn btn-primary" onclick="openBookingModal()">

    <main class="content">

                <div class="week-header-spacer"></div>

                <div class="day-col-header" id="dh1"><span class="day-num">—</span>Tue</div>
                <div class="day-col-header" id="dh2"><span class="day-num">—</span>Wed</div>
                <div class="day-col-header" id="dh3"><span class="day-num">—</span>Thu</div>
                <div class="day-col-header" id="dh4"><span class="day-num">—</span>Fri</div>
                <div class="day-col-header" id="dh5"><span class="day-num">—</span>Sat</div>
              </div>
              <div class="week-body">
                <div class="time-col" id="timeCol"></div>
                <div class="days-area" id="daysArea">

                  <div class="day-column" id="col1"></div>
                  <div class="day-column" id="col2"></div>
                  <div class="day-column" id="col3"></div>
                  <div class="day-column" id="col4"></div>
                  <div class="day-column" id="col5"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="cal-side">
            <div class="cal-side-section">
              <div style="font-size:13.5px;font-weight:700;color:var(--text);margin-bottom:12px;" id="miniCalTitle">—</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
const API    = (location.hostname === 'localhost' || location.hostname === '127.0.0.1') ? 'http://localhost:3001' : '';
const TOKEN  = localStorage.getItem('medibook_token');
const TENANT = localStorage.getItem('medibook_tenant_id');

if (!TOKEN || !TENANT) { location.href = '../pages/login.html'; }

document.getElementById('signOutBtn').addEventListener('click', () => { localStorage.clear(); location.href = '../pages/login.html'; });

const CLINIC_NAME = localStorage.getItem('medibook_clinic_name') ?? 'Callora';
document.getElementById('sidebarName').textContent = CLINIC_NAME;
document.getElementById('sidebarAv').textContent = CLINIC_NAME.slice(0,2).toUpperCase();

const START_HR = 8, END_HR = 19, HOUR_H = 52;

let currentWeekMonday = getThisMonday();
let modalDataLoaded = false;

function getThisMonday() {
  const d = new Date(); const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(d.getFullYear(), d.getMonth(), d.getDate() + diff);
  mon.setHours(0,0,0,0); return mon;
}
function isoDate(d) { return d.toISOString().slice(0,10); }
function prevWeek() { currentWeekMonday = new Date(currentWeekMonday.getTime() - 7*86400000); loadCalendar(); }
function nextWeek() { currentWeekMonday = new Date(currentWeekMonday.getTime() + 7*86400000); loadCalendar(); }
function setView(v, btn) {
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (v === 'day') showToast('Day view coming soon');
}

async function apiFetch(path) {
  const r = await fetch(API + path, { headers: { Authorization: `Bearer ${TOKEN}` } });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error ?? 'API error'); }
  return r.json();
}
async function apiPost(path, body) {
  const r = await fetch(API + path, {
    method: 'POST',
    headers: { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error ?? 'API error'); }
  return r.json();
}

function renderTimeCol() {
  let h = '';
  for (let hr = START_HR; hr <= END_HR; hr++)
    h += `<div class="time-label">${String(hr).padStart(2,'0')}:00</div>`;
  document.getElementById('timeCol').innerHTML = h;
}

function renderHourCells() {
  for (let c = 0; c < 6; c++) {
    let h = '';
    for (let hr = START_HR; hr <= END_HR; hr++) h += '<div class="hour-cell"></div>';
    document.getElementById(`col${c}`).innerHTML = h;
  }
}

function updateDayHeaders(mon) {
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i < 6; i++) {
    const d = new Date(mon.getTime() + i * 86400000);
    const el = document.getElementById(`dh${i}`);
    const dn = ['Mon','Tue','Wed','Thu','Fri','Sat'][i];
    el.innerHTML = `<span class="day-num">${d.getDate()}</span>${dn}`;
    el.className = 'day-col-header' + (d.getTime() === today.getTime() ? ' today' : '');
    document.getElementById(`col${i}`).className = 'day-column' + (d.getTime() === today.getTime() ? ' today' : '');
  }
  const end = new Date(mon.getTime() + 5*86400000);
  document.getElementById('weekLabel').textContent =
    `${mon.toLocaleDateString('en-GB',{day:'numeric',month:'short'})} – ${end.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;
}

function renderAppointments(appts, mon) {
  for (let c = 0; c < 6; c++)
    document.querySelectorAll(`#col${c} .appt-block,.now-line`).forEach(e => e.remove());

  appts.forEach(a => {
    const s = new Date(a.startsAt), e = new Date(a.endsAt);
    const idx = Math.floor((s - mon) / 86400000);
    if (idx < 0 || idx > 5) return;
    const sHr = s.getUTCHours() + s.getUTCMinutes()/60;
    const eHr = e.getUTCHours() + e.getUTCMinutes()/60;
    const top = Math.max(0,(sHr - START_HR) * HOUR_H);
    const ht  = Math.max(20,(eHr - sHr) * HOUR_H - 4);
    const color = a.service.color ?? '#0d9488';
    const fmt = dt => `${String(new Date(dt).getUTCHours()).padStart(2,'0')}:${String(new Date(dt).getUTCMinutes()).padStart(2,'0')}`;
    const b = document.createElement('div');
    b.className = 'appt-block';
    b.style.cssText = `top:${top+2}px;height:${ht}px;background:${color}22;border-color:${color};color:${color};`;
    b.innerHTML = `<div class="appt-name">${escHtml(a.client.name)}</div><div class="appt-service">${escHtml(a.service.name)}</div><div class="appt-time-lbl">${fmt(a.startsAt)}–${fmt(a.endsAt)}</div>`;
    b.onclick = () => showToast(`${a.client.name} — ${a.service.name}`);
    document.getElementById(`col${idx}`).appendChild(b);
  });

  // Now-line
  const today = new Date(); today.setHours(0,0,0,0);
  const todayIdx = Math.floor((today - mon)/86400000);
  if (todayIdx >= 0 && todayIdx <= 5) {
    const now = new Date(); const hr = now.getHours() + now.getMinutes()/60;
    if (hr >= START_HR && hr <= END_HR) {
      const line = document.createElement('div'); line.className = 'now-line';
      line.style.top = `${(hr - START_HR) * HOUR_H}px`;
      document.getElementById(`col${todayIdx}`).appendChild(line);
    }
  }
}

function renderMiniCal(mon) {
  const yr = mon.getFullYear(), mo = mon.getMonth();
  document.getElementById('miniCalTitle').textContent = mon.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const first = new Date(yr,mo,1); const offset = first.getDay() === 0 ? 6 : first.getDay()-1;
  const today = new Date(); today.setHours(0,0,0,0);
  const weekEnd = new Date(mon.getTime()+5*86400000);
  let h = ['M','T','W','T','F','S','S'].map(d=>`<div class="mini-cal-day-name">${d}</div>`).join('');
  for (let i=0;i<offset;i++) h += '<div class="mini-cal-day other-month"></div>';
  const dm = new Date(yr,mo+1,0).getDate();
  for (let d=1;d<=dm;d++) {
    const dt = new Date(yr,mo,d);
    const inW = dt>=mon && dt<=weekEnd, isT = dt.getTime()===today.getTime();
    h += `<div class="mini-cal-day${isT?' today':inW?' in-week':''}">${d}</div>`;
  }
  document.getElementById('miniCalGrid').innerHTML = h;
}

function renderOpenSlots(appts) {
  const el = document.getElementById('openSlots');
  // Show times with no appointment in working hours for today
  const today = new Date().toISOString().slice(0,10);
  const todayAppts = appts.filter(a => a.startsAt.startsWith(today));
  const bookedSlots = new Set(todayAppts.map(a => new Date(a.startsAt).getUTCHours()));
  const freeHours = [];
  for (let hr = 9; hr <= 17; hr++) { if (!bookedSlots.has(hr)) freeHours.push(hr); }
  if (!freeHours.length) { el.innerHTML = '<p style="font-size:12.5px;color:var(--text-muted)">Fully booked today.</p>'; return; }
  el.innerHTML = freeHours.slice(0,5).map(hr =>
    `<div onclick="prefillTime('${String(hr).padStart(2,'0')}:00')" style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:6px;cursor:pointer;font-size:12.5px;color:var(--text-2);" onmouseover="this.style.background='var(--brand-dim)'" onmouseout="this.style.background=''">
      <div style="width:7px;height:7px;border-radius:50%;background:var(--green);"></div>
      ${String(hr).padStart(2,'0')}:00 open
    </div>`
  ).join('') + (freeHours.length > 5 ? `<div style="font-size:12px;color:var(--text-muted)">+${freeHours.length-5} more slots</div>` : '');
}

function prefillTime(t) { document.getElementById('bookTime').value = t; openBookingModal(); }

function renderUpcomingTable(appts) {
  document.getElementById('upcomingCount').textContent = `${appts.length} bookings`;
  const tbody = document.getElementById('upcomingTableBody');
  if (!appts.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="padding:20px;text-align:center;color:var(--text-muted)">No appointments this week.</td></tr>';
    return;
  }
  const statusBadge = s => ({
    'CONFIRMED': '<span class="badge badge-green">Confirmed</span>',
    'COMPLETED': '<span class="badge badge-gray">Completed</span>',
    'PENDING':   '<span class="badge badge-gold">Pending</span>',
    'NO_SHOW':   '<span class="badge badge-red">No Show</span>',
  }[s?.toUpperCase()] ?? `<span class="badge badge-gray">${s}</span>`);
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  tbody.innerHTML = appts.map(a => {
    const d = new Date(a.startsAt);
    const t = `${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`;
    return `<tr>
      <td>${days[d.getDay()]} ${d.getDate()}, ${t}</td>
      <td>${escHtml(a.clientName)}</td>
      <td>${escHtml(a.serviceName)}</td>
      <td>${escHtml(a.staffName)}</td>
      <td>${a.durationMins}min</td>
      <td>${statusBadge(a.status)}</td>
    </tr>`;
  }).join('');
}

async function loadCalendar() {
  renderTimeCol(); renderHourCells();
  updateDayHeaders(currentWeekMonday); renderMiniCal(currentWeekMonday);
  const start = isoDate(currentWeekMonday);
  try {
    const [wk, up] = await Promise.all([
      apiFetch(`/api/tenants/${TENANT}/calendar/week?start=${start}`),
      apiFetch(`/api/tenants/${TENANT}/calendar/upcoming?start=${start}`),
    ]);
    renderAppointments(wk.appointments, currentWeekMonday);
    renderOpenSlots(wk.appointments);
    renderUpcomingTable(up.appointments);
  } catch {
    document.getElementById('upcomingTableBody').innerHTML =
      '<tr><td colspan="6" style="padding:20px;text-align:center;color:var(--text-muted)">Could not load. Check connection.</td></tr>';
    document.getElementById('openSlots').innerHTML = '<p style="font-size:12.5px;color:var(--text-muted)">Could not load.</p>';
  }
}

function toggleUpcoming() {
  const body = document.getElementById('upcomingBody');
  const chev = document.getElementById('upcomingChevron');
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : '';
  chev.style.transform = open ? 'rotate(0deg)' : 'rotate(180deg)';
}

// ── Modal ─────────────────────────────────────────────────────────────────────
async function openBookingModal() {
  document.getElementById('bookingModal').classList.add('open');
  if (!document.getElementById('bookDate').value)
    document.getElementById('bookDate').value = new Date().toISOString().slice(0,10);
  if (!modalDataLoaded) {
    try {
      const data = await apiFetch(`/api/tenants/${TENANT}/modal-data`);
      document.getElementById('bookService').innerHTML = data.services.map(s =>
        `<option value="${s.id}">${escHtml(s.name)} (${s.durationMins}min · £${(s.priceCents/100).toFixed(0)})</option>`).join('');
      document.getElementById('bookStaff').innerHTML = data.staff.map(s =>
        `<option value="${s.id}">${escHtml(s.name)}</option>`).join('');
      modalDataLoaded = true;
    } catch { showToast('Could not load services/staff'); }
  }
}
function closeBookingModal() { document.getElementById('bookingModal').classList.remove('open'); }
document.getElementById('bookingModal').addEventListener('click', e => { if (e.target===e.currentTarget) closeBookingModal(); });

async function confirmBooking() {
  const date=document.getElementById('bookDate').value, time=document.getElementById('bookTime').value,
        name=document.getElementById('bookClientName').value.trim(), email=document.getElementById('bookClientEmail').value.trim(),
        svcId=document.getElementById('bookService').value, stfId=document.getElementById('bookStaff').value,
        notes=document.getElementById('bookNotes').value;
  if (!date||!time||!name||!svcId||!stfId) { showToast('Please fill in all required fields'); return; }
  const btn = document.getElementById('bookBtn');
  btn.disabled=true; btn.textContent='Booking…';
  try {
    await apiPost(`/api/tenants/${TENANT}/appointments`, { clientName:name, clientEmail:email||undefined, serviceId:svcId, staffId:stfId, date, time, notes });
    closeBookingModal();
    showToast('Booking confirmed!');
    loadCalendar();
  } catch (err) { showToast(err.message ?? 'Booking failed'); }
  finally { btn.disabled=false; btn.textContent='Book Appointment'; }
}

function escHtml(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<div class="toast-icon">📅</div><div class="toast-content"><div class="toast-title">${escHtml(msg)}</div></div>`;
  document.getElementById('toastWrap').appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),350); }, 3500);
}

document.addEventListener('DOMContentLoaded', loadCalendar);
</script>
